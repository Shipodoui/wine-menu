<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Restaurant Menu</title>
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <header>
      <h1>My Restaurant</h1>
    </header>
    <nav>
      <button onclick="navigate('starters')">Starters</button>
      <button onclick="navigate('main-courses')">Main Courses</button>
      <button onclick="navigate('desserts')">Desserts</button>
    </nav>
    <main>
      <!-- CATEGORIES -->
      <section class="view category" id="starters">
        <div class="menuItem" onclick="navigate('tomato-soup')">
          <h3>Tomato Soup</h3>
          <p>6€</p>
        </div>
        <div class="menuItem" onclick="navigate('caesar-salad')">
          <h3>Caesar Salad</h3>
          <p>8€</p>
        </div>
      </section>
      <section class="view category" id="main-courses">
        <div class="menuItem" onclick="navigate('burger')">
          <h3>Burger</h3>
          <p>15€</p>
        </div>
        <div class="menuItem" onclick="navigate('steak')">
          <h3>Steak</h3>
          <p>24€</p>
        </div>
      </section>
      <section class="view category" id="desserts">
        <div class="menuItem" onclick="navigate('chocolate-cake')">
          <h3>Chocolate Cake</h3>
          <p>7€</p>
        </div>
      </section>
      <!-- ITEMS -->
      <section class="view itemPage" id="tomato-soup">
        <button onclick="navigate('starters')">← Back</button>
        <h2>Tomato Soup</h2>
        <p>Fresh tomato soup with basil.</p>
        <img src="https://picsum.photos/600/300?1" />
      </section>
      <section class="view itemPage" id="caesar-salad">
        <button onclick="navigate('starters')">← Back</button>
        <h2>Caesar Salad</h2>
        <p>Romaine, parmesan, croutons.</p>
        <img src="https://picsum.photos/600/300?2" />
      </section>
      <section class="view itemPage" id="burger">
        <button onclick="navigate('main-courses')">← Back</button>
        <h2>Burger</h2>
        <p>Beef burger with fries.</p>
        <img src="https://picsum.photos/600/300?3" />
      </section>
      <section class="view itemPage" id="steak">
        <button onclick="navigate('main-courses')">← Back</button>
        <h2>Steak</h2>
        <p>Grilled steak with sauce.</p>
        <img src="https://picsum.photos/600/300?4" />
      </section>
      <section class="view itemPage" id="chocolate-cake">
        <button onclick="navigate('desserts')">← Back</button>
        <h2>Chocolate Cake</h2>
        <p>Rich chocolate cake.</p>
        <img src="https://picsum.photos/600/300?5" />
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
